name: CI

on:
  push:
    branches: [main]
    # Only run when code or config actually changes.
    # Add [skip ci] anywhere in the commit message to bypass manually.
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:  # allow manual runs from the GitHub UI

jobs:
  # Fast tests (no model, no real data)
  # Runs on every push. Finishes in ~60s. Catches preprocessing and dataset bugs.
  test-fast:
    name: Fast tests (preprocessing + datasets + folds)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run fast tests
        # Exclude test_reve.py — it needs the pretrained model weights
        # which are not stored in the repository (too large for git).
        run: uv run python -m pytest tests/ --ignore=tests/test_reve.py -v --tb=short

  # Lint
  # Runs on every push. Checks formatting and common errors.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/
